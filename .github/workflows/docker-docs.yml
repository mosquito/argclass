name: docs-image

on:
  push:
    branches: [ master ]
    paths:
      - 'docs/Dockerfile'
  pull_request:
    branches: [ master ]
    paths:
      - 'docs/Dockerfile'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docs/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:docs-build
